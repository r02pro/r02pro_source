name: Build and Deploy bookdown

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libssl-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('DESCRIPTION') }}
          restore-keys: r-${{ runner.os }}-

      - name: Install R packages
        run: |
          install.packages(c(
            "bookdown", "tidyverse", "r02pro", "plotly",
            "kableExtra", "MASS", "purrr", "glue", "gtools",
            "writexl", "readxl", "knitr", "rmarkdown"
          ))
        shell: Rscript {0}

      - name: Build gitbook
        run: |
          bookdown::render_book("index.Rmd", "bookdown::gitbook")
        shell: Rscript {0}

      - name: Check for broken cross-references
        run: |
          if grep -rq "Chapter ??" _book/ --include="*.html"; then
            echo "::warning::Found broken cross-references (Chapter ??)"
          fi

      - name: Deploy to r02pro.github.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: r02pro/r02pro.github.io
          publish_branch: main
          publish_dir: ./_book
          commit_message: "Update book from ${{ github.sha }}"
